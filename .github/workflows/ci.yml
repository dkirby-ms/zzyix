name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Point 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint ${{ matrix.app }}
        run: npm run lint:${{ matrix.app }}

  # ── Point 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Test ${{ matrix.app }}
        run: npm run test:${{ matrix.app }}
      - name: Upload coverage (${{ matrix.app }})
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-${{ matrix.app }}
          path: apps/${{ matrix.app }}/coverage/
          retention-days: 7

  # ── Point 3: Build ───────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build ${{ matrix.app }}
        run: npm run build:${{ matrix.app }}
