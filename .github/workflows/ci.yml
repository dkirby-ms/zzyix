name: CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'commitlint.config.cjs'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'commitlint.config.cjs'

jobs:
  # ── Point 1: Audit ───────────────────────────────────────────────────────────
  audit:
    name: Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm run audit

  # ── Point 2: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: audit
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint ${{ matrix.app }}
        run: npm run lint:${{ matrix.app }}

  # ── Point 3: Test ────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Test ${{ matrix.app }}
        run: npm run test:${{ matrix.app }}
      - name: Upload coverage (${{ matrix.app }})
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: coverage-${{ matrix.app }}
          path: apps/${{ matrix.app }}/coverage/
          retention-days: 7

  # ── Point 4: Build ───────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build ${{ matrix.app }}
        run: npm run build:${{ matrix.app }}
