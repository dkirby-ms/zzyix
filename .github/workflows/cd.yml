name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build And Push (${{ matrix.app }})
    if: >-
      ${{ github.event_name == 'workflow_dispatch' || (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.head_branch == 'main'
      ) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Check Out
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve Release Version Tag
        id: version
        run: |
          set -euo pipefail

          app_tag="$(git tag --points-at HEAD --list "${{ matrix.app }}-v*" --sort=-v:refname | head -n 1 || true)"
          if [[ -z "${app_tag}" ]]; then
            echo "has_semver=false" >> "$GITHUB_OUTPUT"
            echo "semver=" >> "$GITHUB_OUTPUT"
            echo "semver_tag=" >> "$GITHUB_OUTPUT"
            echo "No app release tag found at HEAD for ${{ matrix.app }}."
            exit 0
          fi

          semver="${app_tag#${{ matrix.app }}-v}"
          echo "has_semver=true" >> "$GITHUB_OUTPUT"
          echo "semver=${semver}" >> "$GITHUB_OUTPUT"
          echo "semver_tag=${app_tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${app_tag} for ${{ matrix.app }} image tagging."

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Log In To GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.semver }},enable=${{ steps.version.outputs.has_semver == 'true' }}
            type=raw,value=${{ steps.version.outputs.semver_tag }},enable=${{ steps.version.outputs.has_semver == 'true' }}

      - name: Build And Push Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy To Azure Container Apps (staging)
    needs: build-and-push
    if: >-
      ${{ github.event_name == 'workflow_dispatch' || (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.head_branch == 'main'
      ) }}
    runs-on: ubuntu-latest
    environment: staging

    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      CONTAINERAPPS_ENVIRONMENT: ${{ vars.AZURE_CONTAINERAPPS_ENVIRONMENT }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      SERVER_CONTAINER_APP_NAME: ${{ vars.SERVER_CONTAINER_APP_NAME }}
      CLIENT_CONTAINER_APP_NAME: ${{ vars.CLIENT_CONTAINER_APP_NAME }}
      SERVER_IMAGE: ghcr.io/${{ github.repository }}-server:${{ github.event.workflow_run.head_sha || github.sha }}
      CLIENT_IMAGE: ghcr.io/${{ github.repository }}-client:${{ github.event.workflow_run.head_sha || github.sha }}
      SERVER_TARGET_PORT: '3001'
      CLIENT_TARGET_PORT: '80'
      CONFIGURED_CORS_ORIGIN: ${{ vars.SERVER_CORS_ORIGIN }}

    steps:
      - name: Check Out
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Azure Login
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps CLI Extension
        uses: azure/cli@9fe27e8f2d4177d9755d43d94f89e79f065ef883
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade --allow-preview true

      - name: Deploy Server Container App (Bootstrap)
        uses: azure/cli@9fe27e8f2d4177d9755d43d94f89e79f065ef883
        with:
          inlineScript: |
            set -euo pipefail

            if [[ -z "${RESOURCE_GROUP}" || -z "${CONTAINERAPPS_ENVIRONMENT}" || -z "${SERVER_CONTAINER_APP_NAME}" ]]; then
              echo "Missing required environment variables for server deploy."
              exit 1
            fi

            if [[ -z "${{ secrets.SERVER_DATABASE_URL }}" ]]; then
              echo "Missing required secret: SERVER_DATABASE_URL"
              exit 1
            fi

            if [[ ! "${{ secrets.SERVER_DATABASE_URL }}" =~ ^postgres(ql)?:// ]]; then
              echo "SERVER_DATABASE_URL must be a full Postgres connection string (postgres://... or postgresql://...)."
              exit 1
            fi

            SERVER_CORS_ORIGIN_BOOTSTRAP="${CONFIGURED_CORS_ORIGIN:-}"
            if [[ -z "${SERVER_CORS_ORIGIN_BOOTSTRAP}" ]]; then
              client_fqdn="$({
                az containerapp show \
                  --resource-group "${RESOURCE_GROUP}" \
                  --name "${CLIENT_CONTAINER_APP_NAME}" \
                  --query properties.configuration.ingress.fqdn \
                  --output tsv 2>/dev/null || true
              } | tr -d '\r')"

              if [[ -n "${client_fqdn}" && "${client_fqdn}" != "null" ]]; then
                SERVER_CORS_ORIGIN_BOOTSTRAP="https://${client_fqdn}"
              else
                SERVER_CORS_ORIGIN_BOOTSTRAP="https://localhost"
              fi
            fi

            echo "SERVER_CORS_ORIGIN_BOOTSTRAP=${SERVER_CORS_ORIGIN_BOOTSTRAP}" >> "${GITHUB_ENV}"
            echo "Bootstrap CORS origin: ${SERVER_CORS_ORIGIN_BOOTSTRAP}"

            HAS_GHCR_CREDS=false
            if [[ -n "${{ secrets.AZURE_GHCR_USERNAME }}" && -n "${{ secrets.AZURE_GHCR_PASSWORD }}" ]]; then
              HAS_GHCR_CREDS=true
            fi

            if az containerapp show \
              --resource-group "${RESOURCE_GROUP}" \
              --name "${SERVER_CONTAINER_APP_NAME}" >/dev/null 2>&1; then
              az containerapp secret set \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${SERVER_CONTAINER_APP_NAME}" \
                --secrets "database-url=${{ secrets.SERVER_DATABASE_URL }}"

              if [[ "${HAS_GHCR_CREDS}" == "true" ]]; then
                az containerapp registry set \
                  --resource-group "${RESOURCE_GROUP}" \
                  --name "${SERVER_CONTAINER_APP_NAME}" \
                  --server "ghcr.io" \
                  --username "${{ secrets.AZURE_GHCR_USERNAME }}" \
                  --password "${{ secrets.AZURE_GHCR_PASSWORD }}"
              fi

              az containerapp update \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${SERVER_CONTAINER_APP_NAME}" \
                --image "${SERVER_IMAGE}" \
                --set-env-vars "NODE_ENV=production" "CORS_ORIGIN=${SERVER_CORS_ORIGIN_BOOTSTRAP}" "DATABASE_URL=secretref:database-url"
            else
              CREATE_REGISTRY_ARGS=()
              if [[ "${HAS_GHCR_CREDS}" == "true" ]]; then
                CREATE_REGISTRY_ARGS=(
                  --registry-server "ghcr.io"
                  --registry-username "${{ secrets.AZURE_GHCR_USERNAME }}"
                  --registry-password "${{ secrets.AZURE_GHCR_PASSWORD }}"
                )
              fi

              az containerapp create \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${SERVER_CONTAINER_APP_NAME}" \
                --environment "${CONTAINERAPPS_ENVIRONMENT}" \
                --image "${SERVER_IMAGE}" \
                --target-port "${SERVER_TARGET_PORT}" \
                --ingress internal \
                --env-vars "NODE_ENV=production" "CORS_ORIGIN=${SERVER_CORS_ORIGIN_BOOTSTRAP}" "DATABASE_URL=secretref:database-url" \
                --secrets "database-url=${{ secrets.SERVER_DATABASE_URL }}" \
                --min-replicas 1 \
                ${CREATE_REGISTRY_ARGS[@]}
            fi

            server_ingress_external="$({
              az containerapp show \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${SERVER_CONTAINER_APP_NAME}" \
                --query properties.configuration.ingress.external \
                --output tsv
            } | tr -d '\r')"

            if [[ "${server_ingress_external}" == "true" ]]; then
              az containerapp ingress update \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${SERVER_CONTAINER_APP_NAME}" \
                --type internal \
                --target-port "${SERVER_TARGET_PORT}"
            else
              echo "Server ingress is already internal; skipping ingress update."
            fi

      - name: Deploy Client Container App
        uses: azure/cli@9fe27e8f2d4177d9755d43d94f89e79f065ef883
        with:
          inlineScript: |
            set -euo pipefail

            if [[ -z "${RESOURCE_GROUP}" || -z "${CONTAINERAPPS_ENVIRONMENT}" || -z "${CLIENT_CONTAINER_APP_NAME}" || -z "${SERVER_CONTAINER_APP_NAME}" ]]; then
              echo "Missing required environment variables for client deploy."
              exit 1
            fi

            # Get the server app's internal FQDN (works for both internal and external ingress)
            SERVER_FQDN="$({
              az containerapp show \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${SERVER_CONTAINER_APP_NAME}" \
                --query properties.configuration.ingress.fqdn \
                --output tsv
            } | tr -d '\r')"

            if [[ -z "${SERVER_FQDN}" || "${SERVER_FQDN}" == "null" ]]; then
              echo "ERROR: Could not resolve server app FQDN."
              exit 1
            fi

            BACKEND_SERVICE_HOSTNAME="${SERVER_FQDN}"
            echo "DEBUG: SERVER_CONTAINER_APP_NAME=${SERVER_CONTAINER_APP_NAME}"
            echo "DEBUG: SERVER_FQDN=${SERVER_FQDN}"
            echo "DEBUG: BACKEND_SERVICE_HOSTNAME=${BACKEND_SERVICE_HOSTNAME}"

            HAS_GHCR_CREDS=false
            if [[ -n "${{ secrets.AZURE_GHCR_USERNAME }}" && -n "${{ secrets.AZURE_GHCR_PASSWORD }}" ]]; then
              HAS_GHCR_CREDS=true
            fi

            if az containerapp show \
              --resource-group "${RESOURCE_GROUP}" \
              --name "${CLIENT_CONTAINER_APP_NAME}" >/dev/null 2>&1; then
              if [[ "${HAS_GHCR_CREDS}" == "true" ]]; then
                az containerapp registry set \
                  --resource-group "${RESOURCE_GROUP}" \
                  --name "${CLIENT_CONTAINER_APP_NAME}" \
                  --server "ghcr.io" \
                  --username "${{ secrets.AZURE_GHCR_USERNAME }}" \
                  --password "${{ secrets.AZURE_GHCR_PASSWORD }}"
              fi

              echo "DEBUG: Updating existing client app with BACKEND_SERVICE_HOSTNAME=${BACKEND_SERVICE_HOSTNAME}"
              az containerapp update \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${CLIENT_CONTAINER_APP_NAME}" \
                --image "${CLIENT_IMAGE}" \
                --set-env-vars "BACKEND_SERVICE_HOSTNAME=${BACKEND_SERVICE_HOSTNAME}"
            else
              CREATE_REGISTRY_ARGS=()
              if [[ "${HAS_GHCR_CREDS}" == "true" ]]; then
                CREATE_REGISTRY_ARGS=(
                  --registry-server "ghcr.io"
                  --registry-username "${{ secrets.AZURE_GHCR_USERNAME }}"
                  --registry-password "${{ secrets.AZURE_GHCR_PASSWORD }}"
                )
              fi

              echo "DEBUG: Creating new client app with BACKEND_SERVICE_HOSTNAME=${BACKEND_SERVICE_HOSTNAME}"
              az containerapp create \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${CLIENT_CONTAINER_APP_NAME}" \
                --environment "${CONTAINERAPPS_ENVIRONMENT}" \
                --image "${CLIENT_IMAGE}" \
                --target-port "${CLIENT_TARGET_PORT}" \
                --ingress external \
                --env-vars "BACKEND_SERVICE_HOSTNAME=${BACKEND_SERVICE_HOSTNAME}" \
                --min-replicas 1 \
                ${CREATE_REGISTRY_ARGS[@]}
            fi

      - name: Resolve Server CORS Origin
        uses: azure/cli@9fe27e8f2d4177d9755d43d94f89e79f065ef883
        with:
          inlineScript: |
            set -euo pipefail

            if [[ -n "${CONFIGURED_CORS_ORIGIN:-}" ]]; then
              echo "SERVER_CORS_ORIGIN_EFFECTIVE=${CONFIGURED_CORS_ORIGIN}" >> "${GITHUB_ENV}"
              echo "Using configured SERVER_CORS_ORIGIN from GitHub environment variable."
              exit 0
            fi

            client_fqdn="$({
              az containerapp show \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${CLIENT_CONTAINER_APP_NAME}" \
                --query properties.configuration.ingress.fqdn \
                --output tsv
            } | tr -d '\r')"

            if [[ -z "${client_fqdn}" || "${client_fqdn}" == "null" ]]; then
              echo "Could not resolve client FQDN for CORS origin."
              echo "Set vars.SERVER_CORS_ORIGIN manually and rerun."
              exit 1
            fi

            echo "SERVER_CORS_ORIGIN_EFFECTIVE=https://${client_fqdn}" >> "${GITHUB_ENV}"
            echo "Resolved SERVER_CORS_ORIGIN from client app ingress FQDN."

      - name: Finalize Server CORS Origin
        uses: azure/cli@9fe27e8f2d4177d9755d43d94f89e79f065ef883
        with:
          inlineScript: |
            set -euo pipefail

            if [[ -z "${RESOURCE_GROUP}" || -z "${SERVER_CONTAINER_APP_NAME}" ]]; then
              echo "Missing required environment variables for server CORS finalization."
              exit 1
            fi

            if [[ -z "${SERVER_CORS_ORIGIN_EFFECTIVE:-}" ]]; then
              echo "Effective server CORS origin was not set."
              exit 1
            fi

            if [[ "${SERVER_CORS_ORIGIN_EFFECTIVE}" == "${SERVER_CORS_ORIGIN_BOOTSTRAP:-}" ]]; then
              echo "CORS origin unchanged from bootstrap; skipping server revision update."
              exit 0
            fi

            az containerapp update \
              --resource-group "${RESOURCE_GROUP}" \
              --name "${SERVER_CONTAINER_APP_NAME}" \
              --set-env-vars "NODE_ENV=production" "CORS_ORIGIN=${SERVER_CORS_ORIGIN_EFFECTIVE}" "DATABASE_URL=secretref:database-url"
