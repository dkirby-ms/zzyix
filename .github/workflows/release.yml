name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release (${{ matrix.app }})
    if: >-
      ${{ github.event_name == 'workflow_dispatch' || (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.head_branch == 'main'
      ) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Check Out
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set Up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check If ${{ matrix.app }} Changed
        id: changed
        run: |
          set -euo pipefail
          chmod +x ./scripts/should-release-app.sh
          ./scripts/should-release-app.sh "${{ matrix.app }}" >> "$GITHUB_OUTPUT"

      - name: Release ${{ matrix.app }}
        if: steps.changed.outputs.release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:${{ matrix.app }}

      - name: Skip Message
        if: steps.changed.outputs.release != 'true'
        run: echo "No app-specific changes detected for ${{ matrix.app }} since last release tag."